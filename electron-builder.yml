appId: com.stark.app
productName: Stark
copyright: Copyright © 2026 Stark Contributors

directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - package.json
  - "!**/*.map"

extraResources:
  - from: resources/runtime-aarch64
    to: runtime-aarch64
    filter:
      - "**/*"
  - from: resources/runtime-x86_64
    to: runtime-x86_64
    filter:
      - "**/*"
  - from: resources/icon.png
    to: icon.png
  - from: resources/tray-icon.png
    to: tray-icon.png
  - from: resources/tray-icon@2x.png
    to: tray-icon@2x.png

asar: true

mac:
  category: public.app-category.productivity
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  icon: resources/icon.png
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  target:
    - target: dmg
      arch: [universal]
  notarize:
    teamId: "${APPLE_TEAM_ID}"

dmg:
  sign: true
  writeUpdateInfo: true

publish:
  provider: github
  releaseType: release
